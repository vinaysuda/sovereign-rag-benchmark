version: '3.8'

services:
  # 1. Vector Database
  postgres:
    image: ankane/pgvector:latest
    container_name: rag_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: sovereign_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sovereign_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Asynchronous Message Broker
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata: